<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo App</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>  
    <div class="container">
      <h2>Todo App</h2>
      <div class="input-section">
        <input
          type="text"
          placeholder="Add todo..."
          id="task-input"
          aria-label="Add todo"
        />
        <input type="date" id="date-input" aria-label="Select date" />
        <button type="button" id="add-button">Add</button>
        <button type="button" id="edit-button" style="display: none">
          Edit
        </button>
      </div>
      <div class="todos-operator">
        <div>
          <button type="button" class="filter-todos" data-filter="all">
            All
          </button>
          <button type="button" class="filter-todos" data-filter="pending">
            Pending
          </button>
          <button type="button" class="filter-todos" data-filter="completed">
            Completed
          </button>
        </div>
        <button type="button" id="delete-all-button">Delete All</button>
      </div>
    </div>

    <div id="alert-message" role="alert"></div>

    <div class="table">
      <table>
        <thead>
          <tr>
            <th>Task</th>
            <th>Date</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <script src="./js/app.js"></script>
  </body>
</html>
